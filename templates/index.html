<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Weather Conditions</title>
    <link href="{{url_for('static', filename='styles/style.css')}}" rel="stylesheet" />
</head>
<body class="app-shell home-shell">
    <main class="hero-grid">
        <section class="panel panel--intro">
            <p class="eyebrow">Weather Forecast</p>
            <h1>Get Weather Conditions</h1>
            <p class="lede">Search any city and view the current temperature and conditions.</p>

            <form class="search-form" action="/weather">
                <label class="sr-only" for="city">City name</label>
                <input type="text" name="city" id="city" placeholder="Enter city name" required />
                <button type="submit">Get Weather</button>
            </form>
        </section>
    </main>
</body>
</html>
