<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} Weather</title>
    <link href="{{url_for('static', filename='styles/style.css')}}" rel="stylesheet" />
</head>
<body class="app-shell weather-shell">
    <main class="hero-grid">
        <section class="panel panel--result">
            <div class="result-head">
                <div>
                    <p class="eyebrow">Current Weather</p>
                    <h1>{{ title }}</h1>
                </div>
                <div class="status-pill">{{ status }}</div>
            </div>

            <div class="weather-metrics">
                <div class="metric metric--primary">
                    <span class="metric__label">Temperature</span>
                    <span class="metric__value">{{ temp }}&deg;C</span>
                </div>
                <div class="metric">
                    <span class="metric__label">Feels like</span>
                    <span class="metric__value">{{ feels_like }}&deg;C</span>
                </div>
            </div>

            <form class="search-form search-form--compact" action="/weather">
                <label class="sr-only" for="city">City name</label>
                <input type="text" name="city" id="city" placeholder="Try another city" required />
                <button type="submit">Search again</button>
            </form>
        </section>
    </main>
</body>
</html>
